# =============================================================================
# GitHub Actions – PV Manager Workflow
# =============================================================================
# Triggers on push/PR to main branch and can also be manually triggered.
# Pipeline: Validate YAML → Build Docker Image → Smoke Test Container
# =============================================================================
name: PV Manager – Backup & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      action:
        description: "PV Manager action to run"
        required: false
        default: "validate"
        type: choice
        options: [ validate, build ]

env:
  PV_NAMESPACE: pv-manager

jobs:
  # ──────────────────────────────────────────────────────────────────
  # JOB 1: Validate Kubernetes manifests & scripts
  # ──────────────────────────────────────────────────────────────────
  validate-manifests:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate YAML syntax of all K8s manifests
        run: |
          echo "═══════════════════════════════════════════════"
          echo " Validating Kubernetes YAML syntax"
          echo "═══════════════════════════════════════════════"
          FAIL=0
          for f in k8s/*.yaml; do
            if python3 -c "import yaml; list(yaml.safe_load_all(open('$f')))" 2>/dev/null; then
              echo "✔ $f — valid YAML"
            else
              echo "✘ $f — INVALID YAML"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "❌ Some manifests have invalid YAML!"
            exit 1
          fi
          echo ""
          echo "✅ All Kubernetes manifests have valid YAML syntax!"

      - name: Verify required K8s manifest files exist
        run: |
          echo "═══════════════════════════════════════════════"
          echo " Checking required manifest files"
          echo "═══════════════════════════════════════════════"
          REQUIRED="namespace.yaml pv.yaml pvc.yaml deployment.yaml service.yaml rbac.yaml"
          for f in $REQUIRED; do
            if [ -f "k8s/$f" ]; then
              echo "✔ k8s/$f exists"
            else
              echo "✘ k8s/$f is MISSING"
              exit 1
            fi
          done
          echo ""
          echo "✅ All required manifest files are present!"

      - name: Verify PV Manager script syntax
        run: |
          echo "═══════════════════════════════════════════════"
          echo " Checking pv_manager.sh Bash syntax"
          echo "═══════════════════════════════════════════════"
          chmod +x scripts/pv_manager.sh
          bash -n scripts/pv_manager.sh
          echo "✅ pv_manager.sh has valid Bash syntax"

      - name: Display project structure
        run: |
          echo "═══════════════════════════════════════════════"
          echo " Project Structure"
          echo "═══════════════════════════════════════════════"
          find . -not -path './.git/*' -not -path './app/venv/*' | sort | head -60

  # ──────────────────────────────────────────────────────────────────
  # JOB 2: Build & test Docker image
  # ──────────────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate-manifests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          echo "═══════════════════════════════════════════════"
          echo " Building Docker Image: pv-demo-app:latest"
          echo "═══════════════════════════════════════════════"
          docker build -t pv-demo-app:latest ./app
          echo ""
          docker images pv-demo-app:latest
          echo ""
          echo "✅ Docker image built successfully!"

      - name: Smoke test — run container and verify health
        run: |
          echo "═══════════════════════════════════════════════"
          echo " Container Smoke Test"
          echo "═══════════════════════════════════════════════"
          docker run -d --name pv-test -p 5001:5000 pv-demo-app:latest
          sleep 5
          echo "── Checking HTTP response ──"
          curl -f http://localhost:5001/ && echo "" && echo "✅ Web UI is accessible!" || { echo "❌ Health check failed"; docker logs pv-test; exit 1; }
          echo ""
          echo "── Checking API endpoint ──"
          curl -f http://localhost:5001/messages && echo "" && echo "✅ API endpoint is working!" || echo "⚠ API check skipped"
          echo ""
          echo "── Container Logs ──"
          docker logs pv-test
          docker stop pv-test && docker rm pv-test
          echo ""
          echo "✅ Container smoke test passed!"

  # ──────────────────────────────────────────────────────────────────
  # JOB 3: Pipeline summary
  # ──────────────────────────────────────────────────────────────────
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [validate-manifests, build-docker]

    steps:
      - name: Print summary
        run: |
          echo "═══════════════════════════════════════════════"
          echo "          PIPELINE SUMMARY"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "  ✅ K8s Manifests:  VALID"
          echo "  ✅ Bash Scripts:   VALID"
          echo "  ✅ Docker Image:   BUILT"
          echo "  ✅ Smoke Test:     PASSED"
          echo ""
          echo "  This project is ready for deployment to"
          echo "  any Kubernetes cluster."
          echo "═══════════════════════════════════════════════"
